substitutions:
  room_temp_entity: sensor.ac2_temperature
  room_humidity_entity: sensor.ac2_humidity
  target_temp_entity: sensor.target_temp
  external_temp_entity: sensor.demo_external_temperature
  weather_icon_entity: sensor.weather_condition_number
  cool_off_icon_entity: sensor.thermo_cool_off_number
  thermo_state_entity: sensor.thermo_state
  date_entity: sensor.date
  time_entity: sensor.time
  cool_off_text_entity: sensor.thermo_cool_off
  fan_mode_entity: sensor.fan_mode

esphome:
  name: thermostat
  friendly_name: thermostat

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:

# Home Assistant API
# IMPORTANT: do not commit real encryption keys.
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Fallback hotspot if Wi-Fi fails
  ap:
    ssid: "thermostat Fallback Hotspot"
    password: !secret fallback_ap_password

captive_portal:

# Nextion UART (adjust pins to your wiring)
uart:
  rx_pin: GPIO44
  tx_pin: GPIO43
  baud_rate: 115200
  id: uart_1

# Data coming from Home Assistant (many of these originate from Zigbee2MQTT sensors)
sensor:
  - platform: homeassistant   # Room temperature
    id: temp1
    entity_id: ${room_temp_entity}

  - platform: homeassistant   # Room humidity
    id: hum1
    entity_id: ${room_humidity_entity}

  - platform: homeassistant   # Target temperature (setpoint)
    id: t_temp1
    entity_id: ${target_temp_entity}

  - platform: homeassistant   # External temperature (optional)
    id: ext_temp1
    entity_id: ${external_temp_entity}

  - platform: homeassistant   # Weather icon number (used to set Nextion picture)
    id: today_icon
    entity_id: ${weather_icon_entity}

  - platform: homeassistant   # Cool/Off icon number
    id: cool_off_number1
    entity_id: ${cool_off_icon_entity}

text_sensor:
  - platform: homeassistant   # AC state text (ex: "Cooling", "Off")
    id: state1
    entity_id: ${thermo_state_entity}

  - platform: homeassistant   # Date
    id: date1
    entity_id: ${date_entity}

  - platform: homeassistant   # Time
    id: time1
    entity_id: ${time_entity}

  - platform: homeassistant   # "Cool" or "Off" label
    id: cool_off1
    entity_id: ${cool_off_text_entity}

  - platform: homeassistant   # Fan mode label
    id: fan_mode1
    entity_id: ${fan_mode_entity}

# Touch events from Nextion buttons -> call Home Assistant scripts
# IMPORTANT: these scripts must exist in Home Assistant (scripts.yaml)
binary_sensor:
  - platform: nextion
    page_id: 0
    component_id: 5
    id: tempup1
    on_press:
      then:
        - homeassistant.service:
            service: script.tempup1

  - platform: nextion
    page_id: 0
    component_id: 4
    id: tempdown1
    on_press:
      then:
        - homeassistant.service:
            service: script.tempdown1

  - platform: nextion
    page_id: 0
    component_id: 7
    id: acoff1
    on_press:
      then:
        - homeassistant.service:
            service: script.acoff1

  - platform: nextion
    page_id: 0
    component_id: 2
    id: acon1
    on_press:
      then:
        - homeassistant.service:
            service: script.acon1

  # Page 1 controls (modes + fan speeds)
  - platform: nextion
    page_id: 1
    component_id: 2
    id: aconsc4
    on_press:
      then:
        - homeassistant.service:
            service: script.acon1

  - platform: nextion
    page_id: 1
    component_id: 3
    id: drysc4
    on_press:
      then:
        - homeassistant.service:
            service: script.dry1

  - platform: nextion
    page_id: 1
    component_id: 4
    id: fanonlysc4
    on_press:
      then:
        - homeassistant.service:
            service: script.fanonly1

  - platform: nextion
    page_id: 1
    component_id: 5
    id: acoffsc4
    on_press:
      then:
        - homeassistant.service:
            service: script.acoff1

  - platform: nextion
    page_id: 1
    component_id: 7
    id: autosc4
    on_press:
      then:
        - homeassistant.service:
            service: script.fanauto1

  - platform: nextion
    page_id: 1
    component_id: 9
    id: fanlowsc4
    on_press:
      then:
        - homeassistant.service:
            service: script.fanlow1

  - platform: nextion
    page_id: 1
    component_id: 6
    id: fanmedsc4
    on_press:
      then:
        - homeassistant.service:
            service: script.fanmed1

  - platform: nextion
    page_id: 1
    component_id: 8
    id: fanhighsc4
    on_press:
      then:
        - homeassistant.service:
            service: script.fanhigh1

display:
  - platform: nextion
    id: thermo_screen
    uart_id: uart_1
    brightness: 25%
    update_interval: 1s
    lambda: |-
      auto &screen = id(thermo_screen);

      if (!isnan(id(t_temp1).state)) {
        screen.set_component_text_printf("page00.t0", "%.1f C", id(t_temp1).state);
      }

      if (!isnan(id(temp1).state)) {
        screen.set_component_text_printf("page00.t1", "%.1f C", id(temp1).state);
      }

      if (!isnan(id(ext_temp1).state)) {
        screen.set_component_text_printf("page00.t3", "%.1f C", id(ext_temp1).state);
      }

      if (!id(date1).state.empty()) {
        screen.set_component_text("page00.t4", id(date1).state.c_str());
      }

      if (!id(time1).state.empty()) {
        screen.set_component_text("page00.t6", id(time1).state.c_str());
      }

      if (!isnan(id(today_icon).state)) {
        screen.send_command_printf("%s.pic=%.0f", "page00.p2", id(today_icon).state);
      }

      if (!isnan(id(cool_off_number1).state)) {
        screen.send_command_printf("%s.pic=%.0f", "page00.p0", id(cool_off_number1).state);
      }

      if (!isnan(id(hum1).state)) {
        screen.set_component_text_printf("page00.t2", "%.0f %%", id(hum1).state);
      }

      if (!id(cool_off1).state.empty()) {
        screen.set_component_text_printf("page04.t0", "%s", id(cool_off1).state.c_str());
      }

      if (!id(fan_mode1).state.empty()) {
        screen.set_component_text_printf("page04.t1", "%s", id(fan_mode1).state.c_str());
      }
